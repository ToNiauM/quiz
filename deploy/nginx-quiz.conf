# nginx como proxy reverso do Quiz CFC (alternativa ao Caddy/Docker).
#
# Passos (Ubuntu/Debian, como root):
#   cp deploy/nginx-quiz.conf /etc/nginx/sites-available/quiz-cfc
#   ln -s /etc/nginx/sites-available/quiz-cfc /etc/nginx/sites-enabled/
#   # troque quiz.seudominio.com.br abaixo pelo seu domínio
#   nginx -t && systemctl reload nginx
#   # HTTPS automático com certbot (precisa de domínio apontando para a VPS):
#   apt install certbot python3-certbot-nginx
#   certbot --nginx -d quiz.seudominio.com.br
#
# O certbot reescreve este server{} para escutar 443 com TLS e redirecionar o 80.
# Os blocos 'Upgrade'/'Connection' abaixo são o que faz os WebSockets (wss://)
# funcionarem através do proxy — não remova.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name quiz.seudominio.com.br;   # <- troque pelo seu domínio (ou _ para qualquer host/IP)

    # Quanto maior, mais tempo o WebSocket fica aberto sem tráfego antes de cair.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
