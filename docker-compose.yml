# Quiz CFC — stack de produção (app + Caddy com HTTPS automático)
#
# Configuração via arquivo .env (veja .env.example):
#   DOMAIN          quiz.seudominio.com.br   -> HTTPS automático (Let's Encrypt)
#                   :80                       -> só HTTP no IP (sem domínio)
#   ADMIN_PASSWORD  senha da tela /admin
#
# Subir:   docker compose up -d --build
# Logs:    docker compose logs -f
# Parar:   docker compose down

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Wand123}
    volumes:
      - ./questions.json:/app/questions.json
    ports:
      - "127.0.0.1:12005:8000"
