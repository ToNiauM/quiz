<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quiz CFC — Apresentador</title>
<style>
  :root{
    --azul:#003b71; --azul2:#0a5aa8; --verde:#00995d; --verde2:#00c178;
    --dourado:#f2a900; --vermelho:#e23b50; --branco:#fff;
    --c1:#e23b50; --c2:#0a5aa8; --c3:#f2a900; --c4:#00995d;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Segoe UI",system-ui,Arial,sans-serif;color:#fff;overflow:hidden;
    background:radial-gradient(1200px 600px at 20% -10%,#0a5aa8,transparent),
               radial-gradient(1000px 700px at 100% 120%,#00995d,transparent),
               linear-gradient(160deg,#022a52,#003b71);
    background-attachment:fixed;
  }
  .wrap{height:100dvh;display:flex;flex-direction:column;}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;
    background:rgba(0,0,0,.22);}
  .brand{display:flex;align-items:center;gap:14px;font-weight:900;font-size:22px;}
  .mark{width:48px;height:48px;border-radius:14px;background:#fff;display:grid;place-items:center;
    color:var(--azul);font-weight:900;font-size:20px;letter-spacing:-1px;}
  .mark span{color:var(--verde);}
  .logo-badge{display:inline-flex;align-items:center;background:#fff;border-radius:12px;
    padding:7px 12px;box-shadow:0 4px 14px rgba(0,0,0,.25);}
  .logo-badge img{height:38px;display:block;}
  .controls{display:flex;gap:10px;}
  .btn{border:none;border-radius:12px;padding:12px 22px;font-weight:800;font-size:16px;
    cursor:pointer;color:var(--azul);background:var(--dourado);transition:transform .1s,filter .2s;}
  .btn:hover{filter:brightness(1.07);} .btn:active{transform:scale(.96);}
  .btn.green{background:var(--verde2);color:#012;} .btn.ghost{background:rgba(255,255,255,.15);color:#fff;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  a.btn{text-decoration:none;display:inline-flex;align-items:center;}

  main{flex:1;position:relative;}
  .screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;padding:24px;animation:fade .4s ease;}
  .screen.on{display:flex;}
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes grow{from{height:0}}

  /* LOBBY */
  .join-card{display:flex;gap:40px;align-items:center;background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.16);border-radius:26px;padding:30px 40px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);animation:pop .5s ease;}
  .join-info{display:flex;flex-direction:column;gap:22px;align-items:center;}
  .join-card .url{font-size:18px;opacity:.85;text-align:center;line-height:1.5;}
  .join-card .big{font-size:38px;font-weight:900;color:var(--dourado);}
  .qrbox{width:300px;height:300px;background:#fff;border-radius:20px;padding:16px;
    display:grid;place-items:center;box-shadow:0 14px 36px rgba(0,0,0,.3);}
  .qrbox svg{width:100%;height:100%;display:block;}
  .qrloading{color:var(--azul);font-weight:800;font-size:16px;}
  .pin{text-align:center;}
  .pin .label{font-size:15px;opacity:.7;letter-spacing:2px;}
  .pin .code{font-size:72px;font-weight:900;letter-spacing:6px;line-height:1;}
  .count{margin-top:26px;font-size:24px;font-weight:800;}
  .count b{color:var(--dourado);font-size:30px;}
  .names{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:1100px;margin-top:24px;
    max-height:34vh;overflow:hidden;}
  .chip{background:rgba(255,255,255,.14);padding:9px 16px;border-radius:999px;font-weight:700;
    animation:pop .35s ease;}

  /* PERGUNTA */
  .qtop{position:absolute;top:18px;left:0;right:0;display:flex;align-items:center;
    justify-content:space-between;padding:0 36px;}
  .pos{font-size:22px;font-weight:800;background:rgba(0,0,0,.25);padding:8px 18px;border-radius:999px;}
  .ans-count{font-size:20px;font-weight:800;background:rgba(0,0,0,.25);padding:8px 18px;border-radius:999px;}
  .ring{position:relative;width:128px;height:128px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%,rgba(0,0,0,.45),rgba(0,0,0,.28));
    box-shadow:0 0 0 4px var(--dourado),0 10px 34px rgba(242,169,0,.45),inset 0 0 22px rgba(0,0,0,.35);}
  .ring svg{position:absolute;top:4px;left:4px;transform:rotate(-90deg);}
  .ring .num{position:absolute;inset:0;top:10px;display:grid;place-items:center;
    font-size:46px;font-weight:900;color:var(--dourado);text-shadow:0 2px 10px rgba(0,0,0,.5);}
  .ring .ring-lbl{position:absolute;top:14px;left:0;right:0;text-align:center;font-size:12px;
    font-weight:900;letter-spacing:3px;opacity:.85;}
  .ring.low{box-shadow:0 0 0 4px var(--vermelho),0 10px 34px rgba(226,59,80,.55),inset 0 0 22px rgba(0,0,0,.35);
    animation:tpulse .7s ease-in-out infinite;}
  .ring.low .num{color:#fff;}
  @keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  .qtext{font-size:clamp(28px,4.2vw,52px);font-weight:900;text-align:center;max-width:1100px;
    margin:30px auto 26px;line-height:1.25;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:18px;width:100%;max-width:1150px;}
  .opt{display:flex;align-items:center;gap:18px;padding:24px 26px;border-radius:18px;
    font-size:clamp(18px,2vw,28px);font-weight:800;box-shadow:0 12px 30px rgba(0,0,0,.28);
    animation:pop .35s ease backwards;}
  .opt .sh{font-size:34px;}
  .opt:nth-child(1){background:var(--c1);animation-delay:.03s;}
  .opt:nth-child(2){background:var(--c2);animation-delay:.09s;}
  .opt:nth-child(3){background:var(--c3);color:#3a2a00;animation-delay:.15s;}
  .opt:nth-child(4){background:var(--c4);animation-delay:.21s;}
  .opt .bar{margin-left:auto;font-size:22px;font-weight:900;opacity:.0;transition:opacity .3s;}
  .opt.show-bar .bar{opacity:1;}
  .opt.wrong{filter:grayscale(.7) brightness(.6);}
  .opt.correct{outline:6px solid #fff;animation:pulseWin 1s ease infinite;}
  @keyframes pulseWin{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.5)}50%{box-shadow:0 0 0 14px rgba(255,255,255,0)}}

  /* RANKING */
  .rank-title{font-size:34px;font-weight:900;margin-bottom:22px;}
  .rank-title b{color:var(--dourado);}
  .rows{width:100%;max-width:820px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.1);
    border-radius:14px;padding:14px 20px;font-size:22px;font-weight:800;animation:fade .4s backwards;}
  .row .place{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
    background:rgba(255,255,255,.18);font-size:18px;}
  .row.top1 .place{background:var(--dourado);color:var(--azul);}
  .row.top2 .place{background:#cfd6e0;color:var(--azul);}
  .row.top3 .place{background:#d98a3d;}
  .row .sc{margin-left:auto;color:var(--dourado);}

  /* PÓDIO */
  .podium{display:flex;align-items:flex-end;gap:24px;justify-content:center;}
  .pcol{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .pcol .who{font-size:26px;font-weight:900;}
  .pcol .pts{font-size:20px;color:var(--dourado);font-weight:800;}
  .bar3{width:200px;border-radius:16px 16px 0 0;display:grid;place-items:center;
    font-size:60px;font-weight:900;color:var(--azul);animation:grow .8s ease;}
  .bar3.first{height:300px;background:var(--dourado);}
  .bar3.second{height:220px;background:#cfd6e0;}
  .bar3.third{height:160px;background:#d98a3d;color:#fff;}
  .winner-line{font-size:40px;font-weight:900;margin-bottom:30px;}
  .conf{position:fixed;top:-10px;width:10px;height:16px;opacity:.9;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.7}}
  .hint{margin-top:18px;opacity:.7;font-size:15px;}
  /* modal de pontuação completa */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:24px;animation:fade .25s ease;}
  .modal.on{display:flex;}
  .modal-panel{background:linear-gradient(160deg,#022a52,#003b71);border:1px solid rgba(255,255,255,.18);
    border-radius:20px;width:min(760px,100%);max-height:88vh;display:flex;flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,.55);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:18px 24px;border-bottom:1px solid rgba(255,255,255,.14);font-size:21px;font-weight:800;}
  .modal-head b{color:var(--dourado);}
  .modal-panel .rows{overflow-y:auto;padding:16px 24px 24px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="logo-badge"><img src="/static/logo-cfc.png" alt="Conselho Federal de Contabilidade" /></span> Quiz CFC — Apresentador</div>
    <div class="controls" id="controls">
      <a class="btn ghost" id="btn-admin" href="/admin" target="_blank" rel="noopener" title="Gerenciar as perguntas (requer senha)">⚙ Perguntas</a>
      <button class="btn green" id="btn-start">▶ Iniciar</button>
      <button class="btn" id="btn-skip" style="display:none">⏭ Encerrar pergunta</button>
      <button class="btn green" id="btn-next" style="display:none">Próxima ▶</button>
      <button class="btn ghost" id="btn-reset">↺ Reiniciar</button>
    </div>
  </header>

  <main>
    <!-- LOBBY -->
    <section class="screen on" id="s-lobby">
      <div class="join-card">
        <div class="qrbox" id="qrbox"><div class="qrloading">Gerando QR…</div></div>
        <div class="join-info">
          <div class="url">Aponte a câmera<br/>ou acesse:<br/><span class="big" id="join-url">—</span></div>
          <div class="pin">
            <div class="label">SALA</div>
            <div class="code" id="pin">000000</div>
          </div>
        </div>
      </div>
      <div class="count">Jogadores conectados: <b id="count">0</b> <span id="title-lbl"></span></div>
      <div class="names" id="names"></div>
    </section>

    <!-- PERGUNTA -->
    <section class="screen" id="s-question">
      <div class="qtop">
        <div class="pos" id="pos">1 / 6</div>
        <div class="ans-count">✋ <span id="ans">0</span>/<span id="ans-total">0</span></div>
        <div class="ring" id="ring">
          <div class="ring-lbl">TEMPO</div>
          <svg width="120" height="120"><circle cx="60" cy="60" r="52" stroke="rgba(255,255,255,.18)" stroke-width="12" fill="none"/>
            <circle id="ring-fg" cx="60" cy="60" r="52" stroke="var(--dourado)" stroke-width="12" fill="none"
              stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="0"/></svg>
          <div class="num" id="timer">20</div>
        </div>
      </div>
      <div class="qtext" id="qtext">Pergunta…</div>
      <div class="opts" id="opts"></div>
    </section>

    <!-- RANKING -->
    <section class="screen" id="s-rank">
      <div class="rank-title">🏅 Ranking — após a pergunta <b id="rank-q">1</b></div>
      <div class="rows" id="rows"></div>
      <div class="hint">Clique em “Próxima” para continuar.</div>
    </section>

    <!-- PÓDIO -->
    <section class="screen" id="s-podium">
      <div class="winner-line" id="winner">🏆 —</div>
      <div class="podium" id="podium"></div>
      <div class="rows" id="rows-final" style="margin-top:34px;max-width:640px"></div>
      <button class="btn" id="btn-fulllist" style="margin-top:26px">📋 Ver pontuação completa</button>
      <button class="btn ghost" id="btn-download" style="margin-top:14px">⬇️ Baixar lista (todos os participantes)</button>
    </section>
  </main>
</div>

<!-- LISTA COMPLETA DE PONTUAÇÃO -->
<div class="modal" id="fulllist-modal">
  <div class="modal-panel">
    <div class="modal-head">
      <span>📋 Pontuação completa — <b id="fulllist-count">0</b> jogadores</span>
      <button class="btn ghost" id="btn-fulllist-close">✕ Fechar</button>
    </div>
    <div class="rows" id="fulllist-rows"></div>
  </div>
</div>

<script>
const SHAPES=["▲","◆","●","■"];
const $=s=>document.querySelector(s);
let ws;
let fullRanking=[];   // ranking completo recebido no fim do jogo

function show(id){document.querySelectorAll('.screen').forEach(e=>e.classList.remove('on'));$(id).classList.add('on');}
function setControls({start,skip,next}){
  $('#btn-start').style.display=start?'':'none';
  $('#btn-skip').style.display=skip?'':'none';
  $('#btn-next').style.display=next?'':'none';
}

function requestQR(){
  // pede ao servidor o QR apontando para a URL de entrada que ESTE navegador usa
  const url = `${location.protocol}//${location.host}/`;
  $('#join-url').textContent = location.host;
  if(ws && ws.readyState===1) ws.send(JSON.stringify({type:'qr', url}));
}
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws/host`);
  ws.onopen=()=>requestQR();
  ws.onmessage=ev=>handle(JSON.parse(ev.data));
  ws.onclose=()=>setTimeout(connect,1500);
}
connect();

$('#btn-start').onclick=()=>ws.send(JSON.stringify({type:'start'}));
$('#btn-skip').onclick =()=>ws.send(JSON.stringify({type:'skip'}));
$('#btn-next').onclick =()=>ws.send(JSON.stringify({type:'next'}));
$('#btn-reset').onclick=()=>{ if(confirm('Reiniciar o jogo e zerar o ranking?')) ws.send(JSON.stringify({type:'reset'})); };

// modal de pontuação completa (todos os jogadores)
$('#btn-fulllist').onclick=()=>{
  $('#fulllist-count').textContent=fullRanking.length;
  rankRows($('#fulllist-rows'), fullRanking);
  $('#fulllist-modal').classList.add('on');
};
// baixar lista de todos os participantes (ordenada da maior nota para a menor)
$('#btn-download').onclick=()=>{
  if(!fullRanking.length){ alert('Nenhum participante para listar.'); return; }
  const linhas = fullRanking.map(r => `${r.rank};${r.nickname};${r.score}`);
  const conteudo = 'Posição;Participante;Pontos\n' + linhas.join('\n') + '\n';
  // BOM p/ acentuação correta ao abrir no Excel
  const blob = new Blob(['﻿' + conteudo], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const data = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `pontuacao-quiz-cfc-${data}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

$('#btn-fulllist-close').onclick=()=>$('#fulllist-modal').classList.remove('on');
$('#fulllist-modal').onclick=e=>{ if(e.target.id==='fulllist-modal') $('#fulllist-modal').classList.remove('on'); };

// timer visual
const R=52, C=2*Math.PI*R; let timerInt=null, tDur=20;
$('#ring-fg').setAttribute('stroke-dasharray', C.toFixed(1));
function runTimer(sec){
  tDur=sec; let t=sec;
  $('#timer').textContent=t;
  $('#ring-fg').style.strokeDashoffset=0;
  clearInterval(timerInt);
  const t0=Date.now();
  $('#ring').classList.remove('low');
  timerInt=setInterval(()=>{
    const el=(Date.now()-t0)/1000; const rem=Math.max(0,sec-el);
    $('#timer').textContent=Math.ceil(rem);
    $('#ring-fg').style.strokeDashoffset=(C*(1-rem/sec)).toFixed(1);
    const baixo = rem/sec<.3;
    $('#ring-fg').style.stroke = baixo ? 'var(--vermelho)' : 'var(--dourado)';
    $('#ring').classList.toggle('low', baixo && rem>0);
    if(rem<=0){ clearInterval(timerInt); $('#ring').classList.remove('low'); }
  },100);
}

function buildOpts(opcoes){
  const box=$('#opts'); box.innerHTML='';
  opcoes.forEach((o,i)=>{
    const d=document.createElement('div'); d.className='opt'; d.dataset.i=i;
    d.innerHTML=`<span class="sh">${SHAPES[i]||'★'}</span><span>${o}</span><span class="bar"></span>`;
    box.appendChild(d);
  });
}

function rankRows(container, list){
  container.innerHTML='';
  list.forEach((r,idx)=>{
    const row=document.createElement('div');
    row.className='row'+(r.rank<=3?` top${r.rank}`:'');
    row.style.animationDelay=(idx*0.06)+'s';
    row.innerHTML=`<div class="place">${r.rank}</div><div>${r.nickname}</div><div class="sc">${r.score} pts</div>`;
    container.appendChild(row);
  });
}

function confetti(){
  const cols=['#f2a900','#00c178','#0a5aa8','#fff','#e23b50'];
  for(let i=0;i<120;i++){
    const c=document.createElement('div'); c.className='conf';
    c.style.left=Math.random()*100+'vw';
    c.style.background=cols[i%cols.length];
    c.style.animationDuration=(2+Math.random()*2.5)+'s';
    c.style.animationDelay=(Math.random()*1.5)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

function handle(m){
  switch(m.type){
    case 'qr':
      $('#qrbox').innerHTML = m.svg;
      $('#join-url').textContent = location.host;
      break;
    case 'lobby':
      $('#join-url').textContent=location.host;
      $('#pin').textContent=m.pin;
      $('#count').textContent=m.count;
      $('#title-lbl').textContent = m.titulo?`• ${m.titulo}`:'';
      const names=$('#names'); names.innerHTML='';
      (m.players||[]).forEach(n=>{const c=document.createElement('div');c.className='chip';c.textContent=n;names.appendChild(c);});
      $('#ans-total').textContent=m.count;
      show('#s-lobby'); setControls({start:true,skip:false,next:false});
      break;
    case 'question':
      $('#pos').textContent=`${m.index+1} / ${m.total}`;
      $('#ans').textContent='0'; $('#ans-total').textContent='—';
      $('#qtext').textContent=m.pergunta;
      buildOpts(m.opcoes);
      runTimer(m.tempo);
      show('#s-question'); setControls({start:false,skip:true,next:false});
      break;
    case 'answers':
      $('#ans').textContent=m.respostas; $('#ans-total').textContent=m.total;
      break;
    case 'reveal':
      clearInterval(timerInt);
      const total=Math.max(1,m.respostas);
      document.querySelectorAll('.opt').forEach(o=>{
        const i=+o.dataset.i;
        o.classList.add('show-bar');
        o.querySelector('.bar').textContent=m.counts[i];
        if(i===m.correta) o.classList.add('correct'); else o.classList.add('wrong');
      });
      setTimeout(()=>{
        $('#rank-q').textContent=m.index+1;
        rankRows($('#rows'), m.ranking);
        show('#s-rank');
        setControls({start:false,skip:false,next:true});
        $('#btn-next').textContent = m.ultima ? 'Ver pódio 🏆' : 'Próxima ▶';
      }, 2600);
      break;
    case 'game_over':
      renderPodium(m.podium, m.ranking);
      show('#s-podium'); setControls({start:false,skip:false,next:false});
      $('#btn-start').style.display=''; $('#btn-start').textContent='▶ Jogar de novo';
      confetti();
      break;
    case 'info':
      alert(m.message);
      break;
  }
}

function renderPodium(podium, ranking){
  fullRanking = ranking || [];
  const order=[1,0,2]; // 2º, 1º, 3º (visual)
  const classes={0:'first',1:'second',2:'third'};
  const box=$('#podium'); box.innerHTML='';
  $('#winner').textContent = podium[0]?`🏆 ${podium[0].nickname} venceu!`:'Fim de jogo';
  order.forEach(idx=>{
    const p=podium[idx]; if(!p) return;
    const col=document.createElement('div'); col.className='pcol';
    col.innerHTML=`<div class="who">${p.nickname}</div>
      <div class="pts">${p.score} pts</div>
      <div class="bar3 ${classes[idx]}">${idx+1}</div>`;
    box.appendChild(col);
  });
  rankRows($('#rows-final'), fullRanking.slice(0,8));  // prévia; lista completa no modal
  $('#btn-fulllist').style.display = fullRanking.length>8 ? '' : 'none';
}
</script>
</body>
</html>
